name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop]

env:
  MIX_ENV: test

permissions:
  contents: read

jobs:
  test:
    name: Test (OTP ${{ matrix.otp }} / Elixir ${{ matrix.elixir }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - otp: "27.0"
            elixir: "1.17"
          - otp: "27.0"
            elixir: "1.18"
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: ${{ matrix.otp }}
          elixir-version: ${{ matrix.elixir }}

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - name: Restore build cache
        uses: actions/cache@v4
        with:
          path: _build
          key: build-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-${{ hashFiles('mix.lock') }}
          restore-keys: build-${{ runner.os }}-${{ matrix.otp }}-${{ matrix.elixir }}-

      - run: mix deps.get
      - run: mix compile --warnings-as-errors
      - run: mix test
      - run: mix credo --strict

  dialyzer:
    name: Dialyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27.0"
          elixir-version: "1.18"

      - name: Restore dependencies cache
        uses: actions/cache@v4
        with:
          path: deps
          key: deps-${{ runner.os }}-27.0-1.18-${{ hashFiles('mix.lock') }}
          restore-keys: deps-${{ runner.os }}-27.0-1.18-

      - name: Restore PLT cache
        uses: actions/cache@v4
        with:
          path: _build
          key: plt-${{ runner.os }}-27.0-1.18-${{ hashFiles('mix.lock') }}
          restore-keys: plt-${{ runner.os }}-27.0-1.18-

      - run: mix deps.get
      - run: mix dialyzer
